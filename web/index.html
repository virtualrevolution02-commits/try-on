<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AR Try-On Flutter App">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ar_try_on">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <title>ar_try_on</title>
  <link rel="manifest" href="manifest.json">

  <!-- ==================== WEB AR ENGINE ==================== -->
  <style>
    /* The AR Canvas sits behind Flutter */
    #ar-canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
      background-color: #000;
    }

    #ar-video {
      display: none;
      /* Used as a texture source, not rendered directly */
    }

    #ar-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>

  <!-- Three.js (r128 for stability with GLTFLoader) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <!-- Mediapipe Pose -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <script>
    window.WebAREngine = {
      scene: null,
      camera: null,
      renderer: null,
      model: null,
      video: null,
      videoTexture: null,
      poseDetector: null,
      sceneInitialized: false,

      // Bridge for Flutter
      onPoseDetected: null,

      init: async function () {
        console.log("[WebAREngine] Initializing...");
        this.setupThreeJS();
        await this.setupMediaPipe();
        this.startCamera();
      },

      setupThreeJS: function () {
        const container = document.getElementById('ar-canvas-container');
        const canvas = document.getElementById('ar-canvas');

        // Scene
        this.scene = new THREE.Scene();

        // Camera (Orthographic is often better for 2D overlay alignment)
        const aspect = window.innerWidth / window.innerHeight;
        // Using Perspective for now to allow 3D depth, will tuning FOV to match webcam
        this.camera = new THREE.PerspectiveCamera(60, aspect, 0.1, 1000);
        this.camera.position.z = 5;

        // Renderer
        this.renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        // Important: Output encoding for glTF
        this.renderer.outputEncoding = THREE.sRGBEncoding;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        this.scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(0, 5, 5);
        this.scene.add(directionalLight);

        // Resize handler
        window.addEventListener('resize', () => {
          this.camera.aspect = window.innerWidth / window.innerHeight;
          this.camera.updateProjectionMatrix();
          this.renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Setup Video Texture background
        this.video = document.getElementById('ar-video');
        this.videoTexture = new THREE.VideoTexture(this.video);
        this.videoTexture.minFilter = THREE.LinearFilter;
        this.videoTexture.magFilter = THREE.LinearFilter;
        this.videoTexture.format = THREE.RGBFormat;

        // Mirror the camera feed horizontally for a natural "Selfie" mirror effect
        this.videoTexture.wrapS = THREE.RepeatWrapping;
        this.videoTexture.repeat.x = -1;

        this.scene.background = this.videoTexture;

        this.sceneInitialized = true;
        this.animate();
      },

      loadModel: function (glbUrl) {
        console.log("[WebAREngine] Loading model: ", glbUrl);
        if (this.model) {
          this.scene.remove(this.model);
        }

        const loader = new THREE.GLTFLoader();
        loader.load(glbUrl, (gltf) => {
          // Normalize the model's origin using its bounding box
          const boundingBox = new THREE.Box3().setFromObject(gltf.scene);
          const center = boundingBox.getCenter(new THREE.Vector3());
          const size = boundingBox.getSize(new THREE.Vector3());

          // Shift the mesh so the Group's origin (0,0,0) sits at the collarbone (15% below top edge)
          gltf.scene.position.x = -center.x;
          gltf.scene.position.y = -boundingBox.max.y + (size.y * 0.15);
          gltf.scene.position.z = -center.z;

          // Wrap in a group to act as the new anchor point
          this.modelGroup = new THREE.Group();
          this.modelGroup.add(gltf.scene);
          this.model = this.modelGroup;

          // Store intrinsic width for dynamic MediaPipe scaling later
          this.modelIntrinsicWidth = size.x;

          // Initial safe placement, hidden behind camera until pose found
          this.model.position.set(0, 0, -10);
          this.model.scale.set(0, 0, 0);
          this.scene.add(this.model);
          console.log("[WebAREngine] Model loaded and origin-shifted successfully.");
        }, undefined, (error) => {
          console.error("[WebAREngine] GLTF Load Error:", error);
        });
      },

      setupMediaPipe: async function () {
        this.poseDetector = new Pose({
          locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
          }
        });

        this.poseDetector.setOptions({
          modelComplexity: 1,
          smoothLandmarks: true,
          enableSegmentation: false,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5
        });

        this.poseDetector.onResults((results) => {
          this.handlePoseResults(results);
          // Pass raw data back to Flutter if it still wants to draw HUD elements
          if (this.onPoseDetected && results.poseLandmarks) {
            this.onPoseDetected(JSON.stringify(results.poseLandmarks));
          }
        });
      },

      handlePoseResults: function (results) {
        if (!this.model || !results.poseLandmarks || !results.poseWorldLandmarks) {
          // Hide model if no pose
          if (this.model) this.model.scale.set(0, 0, 0);
          return;
        }

        const landmarks = results.poseLandmarks;
        const worldLandmarks = results.poseWorldLandmarks;

        const leftShoulder = landmarks[11];
        const rightShoulder = landmarks[12];
        const leftHip = landmarks[23];
        const rightHip = landmarks[24];

        const wLS = worldLandmarks[11];
        const wRS = worldLandmarks[12];
        const wLH = worldLandmarks[23];
        const wRH = worldLandmarks[24];

        // 1. POSITIONING (Screen Space Mapping)
        const vFOV = THREE.MathUtils.degToRad(this.camera.fov);
        const heightAtZ = 2 * Math.tan(vFOV / 2) * this.camera.position.z;
        const widthAtZ = heightAtZ * this.camera.aspect;

        const cx = (leftShoulder.x + rightShoulder.x) / 2;
        const cy = (leftShoulder.y + rightShoulder.y) / 2;

        // Since we mirrored the VideoTexture (repeat.x = -1), we MUST mirror the MediaPipe X coordinate
        const mirroredCX = 1.0 - cx;

        const targetX = (mirroredCX * 2 - 1) * (widthAtZ / 2);
        const targetY = -(cy * 2 - 1) * (heightAtZ / 2);

        // Apply position. (No manual Y offset needed now because we shifted the bounding box origin to the collarbone!)
        this.model.position.x = targetX;
        this.model.position.y = targetY;

        // 2. DYNAMIC SCALING
        const shoulderDistNormalized = Math.sqrt(Math.pow(leftShoulder.x - rightShoulder.x, 2) + Math.pow(leftShoulder.y - rightShoulder.y, 2));
        // A t-shirt typically overhangs the physical shoulder joints by a margin (approx 2.2x to 2.4x)
        const desiredWidth = shoulderDistNormalized * widthAtZ * 2.3;

        if (this.modelIntrinsicWidth > 0) {
          const scaleFactor = desiredWidth / this.modelIntrinsicWidth;
          this.model.scale.set(scaleFactor, scaleFactor, scaleFactor);
        }

        // 3. ROTATION (True 3D depth from world landmarks)
        // MediaPipe Z: Smaller is closer to camera.

        // Pitch: Leaning forward/backward
        const chestZ = (wLS.z + wRS.z) / 2;
        const hipZ = (wLH.z + wRH.z) / 2;
        const chestY = (wLS.y + wRS.y) / 2;
        const hipY = (wLH.y + wRH.y) / 2;
        // Absolute Y distance avoids the 90-degree flip bug when standing straight up
        const pitch = Math.atan2(hipZ - chestZ, Math.abs(hipY - chestY));

        // Yaw: Turning body left/right
        const yaw = Math.atan2(wRS.z - wLS.z, wLS.x - wRS.x);

        // Roll: Tilting shoulders side-to-side (Must be mirrored due to our texture flip)
        const roll = Math.atan2(wLS.y - wRS.y, wLS.x - wRS.x);

        // Clamping prevents mathematical jitter and extreme unnatural flips
        const clamp = (num, min, max) => Math.min(Math.max(num, min), max);

        this.model.rotation.set(
          clamp(pitch, -0.6, 0.6),    // Pitch (Lean)
          clamp(-yaw, -1.0, 1.0),      // Yaw (Turn) - negated for mirror fix
          clamp(roll, -0.6, 0.6)      // Roll (Tilt)
        );
      },

      startCamera: function () {
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } })
            .then((stream) => {
              this.video.srcObject = stream;
              this.video.play();

              // Feed video frames to MediaPipe
              const sendFrame = async () => {
                if (!this.video.paused && !this.video.ended) {
                  await this.poseDetector.send({ image: this.video });
                }
                requestAnimationFrame(sendFrame);
              };
              this.video.onloadeddata = () => {
                sendFrame();
              };
            })
            .catch((err) => {
              console.error("[WebAREngine] Camera error: ", err);
            });
        }
      },

      animate: function () {
        requestAnimationFrame(() => this.animate());
        if (this.sceneInitialized) {
          this.renderer.render(this.scene, this.camera);
        }
      }
    };

    // Keep the old object name so Flutter bridge doesn't crash immediately while we refactor Dart
    window.flutter_web_pose = {
      init: () => window.WebAREngine.init(),
      set onPoseDetected(cb) { window.WebAREngine.onPoseDetected = cb; },
      // New method for giving the GLB to JS directly
      loadModel: (url) => window.WebAREngine.loadModel(url)
    };

  </script>
</head>

<body>
  <!-- Container for the Three.js canvas -->
  <div id="ar-canvas-container">
    <video id="ar-video" autoplay muted playsinline></video>
    <canvas id="ar-canvas"></canvas>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
