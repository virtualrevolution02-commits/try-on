<!DOCTYPE html>
<html>

<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AR Try-On Flutter App">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ar_try_on">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>ar_try_on</title>
  <link rel="manifest" href="manifest.json">

  <!-- Model Viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <!-- Mediapipe Pose -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <script>
    window.flutter_web_pose = {
      detector: null,
      videoElement: null,
      onPoseDetected: null,

      init: async function () {
        this.detector = new Pose({
          locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
          }
        });

        this.detector.setOptions({
          modelComplexity: 1,
          smoothLandmarks: true,
          enableSegmentation: false,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5
        });

        this.detector.onResults((results) => {
          if (this.onPoseDetected && results.poseLandmarks) {
            // Send landmarks back to Flutter
            this.onPoseDetected(JSON.stringify(results.poseLandmarks));
          }
        });

        // Find the video element created by Flutter's camera package
        // This is a bit hacky but works since Flutter uses <video> for camera web
        const findVideo = () => {
          const videos = document.getElementsByTagName('video');
          if (videos.length > 0) {
            this.videoElement = videos[0];
            this.startTracking();
          } else {
            setTimeout(findVideo, 1000);
          }
        };
        findVideo();
      },

      startTracking: function () {
        const camera = new Camera(this.videoElement, {
          onFrame: async () => {
            await this.detector.send({ image: this.videoElement });
          },
          width: 640,
          height: 480
        });
        camera.start();
      }
    };
  </script>
</head>

<body>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
