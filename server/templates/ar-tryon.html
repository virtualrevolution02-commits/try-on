<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AR Try-On</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    #container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

    #video {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1);
    }

    #overlay-canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; transform: scaleX(-1);
    }

    #debug-canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; transform: scaleX(-1); display: none;
    }

    #status-bar {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(12px);
      border-radius: 100px; padding: 7px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      z-index: 100; transition: opacity 0.4s;
    }
    #status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ff4444; transition: background 0.3s;
    }
    #status-dot.tracking { background: #4CAF50; animation: pulse 1.5s infinite; }
    #status-dot.loading { background: #C9A96E; animation: pulse 0.8s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    #status-text { font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 500; letter-spacing: 0.3px; }

    #loading-overlay {
      position: fixed; inset: 0; background: #0D0D0D;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; z-index: 200; transition: opacity 0.6s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-ring {
      width: 52px; height: 52px; border-radius: 50%;
      border: 2.5px solid rgba(201,169,110,0.2);
      border-top-color: #C9A96E;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-label { font-size: 14px; color: rgba(255,255,255,0.7); font-weight: 400; }
    #loading-sub { font-size: 12px; color: rgba(255,255,255,0.35); }

    #no-clothing-hint {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55); backdrop-filter: blur(12px);
      border-radius: 100px; padding: 9px 20px;
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 13px; color: rgba(255,255,255,0.75);
      z-index: 100; transition: opacity 0.5s;
      white-space: nowrap;
    }
    #no-clothing-hint.hidden { opacity: 0; pointer-events: none; }

    #capture-flash {
      position: fixed; inset: 0; background: #fff;
      opacity: 0; pointer-events: none; z-index: 300;
      transition: opacity 0.05s;
    }
    #capture-flash.flash { opacity: 0.75; }

    #grid-lines {
      position: fixed; inset: 0; pointer-events: none; z-index: 50;
      display: none;
    }
    #grid-lines.visible { display: block; }

    #skeleton-toggle {
      position: fixed; bottom: 30px; right: 20px; z-index: 100;
      background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; padding: 8px 12px;
      color: rgba(255,255,255,0.7); font-size: 11px; cursor: pointer;
      backdrop-filter: blur(10px);
    }

    #item-label {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); backdrop-filter: blur(12px);
      border-radius: 100px; padding: 8px 18px;
      border: 1px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; gap: 8px;
      z-index: 100; transition: opacity 0.4s, transform 0.3s;
      opacity: 0; transform: translateX(-50%) translateY(8px);
    }
    #item-label.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    #item-color-dot { width: 10px; height: 10px; border-radius: 50%; background: #C9A96E; }
    #item-label-text { font-size: 12px; color: #fff; font-weight: 500; }
    #item-price { font-size: 12px; color: #C9A96E; font-weight: 600; }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="loading-ring"></div>
    <div id="loading-label">Loading AI Model</div>
    <div id="loading-sub">This takes a moment the first time</div>
  </div>

  <div id="capture-flash"></div>

  <div id="container">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay-canvas"></canvas>
    <canvas id="debug-canvas"></canvas>
  </div>

  <div id="status-bar">
    <div id="status-dot" class="loading"></div>
    <span id="status-text">Initializing...</span>
  </div>

  <div id="no-clothing-hint">Select a clothing item to try on</div>

  <div id="item-label">
    <div id="item-color-dot"></div>
    <span id="item-label-text">Item Name</span>
    <span id="item-price">$0</span>
  </div>

  <button id="skeleton-toggle" onclick="toggleSkeleton()">Skeleton</button>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.js"></script>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    let detector = null;
    let video = null;
    let overlayCanvas = null;
    let debugCanvas = null;
    let ctx = null;
    let debugCtx = null;
    let animFrameId = null;
    let isRunning = false;
    let showSkeleton = false;

    let currentItem = null; // { imageUrl, category, id, name, price, colorHex }
    let clothingImg = null;
    let clothingLoading = false;

    // Smoothed pose state
    let smooth = {
      midX: null, midY: null, angle: 0,
      shoulderWidth: 0, torsoHeight: 0,
      lAnkleX: null, lAnkleY: null,
      rAnkleX: null, rAnkleY: null,
      hipMidX: null, hipMidY: null,
      hipWidth: 0
    };
    const ALPHA = 0.35; // smoothing factor (lower = more smoothing)

    // ── Utilities ──────────────────────────────────────────────────────────────
    function lerp(a, b, t) { return a + (b - a) * t; }
    function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }

    function smoothVal(prev, next) {
      if (prev === null || isNaN(prev)) return next;
      return lerp(prev, next, ALPHA);
    }

    function angleLerp(a, b, t) {
      let delta = b - a;
      while (delta > Math.PI) delta -= 2 * Math.PI;
      while (delta < -Math.PI) delta += 2 * Math.PI;
      return a + delta * t;
    }

    function setStatus(text, state) {
      document.getElementById('status-text').textContent = text;
      const dot = document.getElementById('status-dot');
      dot.className = state || '';
    }

    function toggleSkeleton() {
      showSkeleton = !showSkeleton;
      document.getElementById('skeleton-toggle').style.color =
        showSkeleton ? '#C9A96E' : 'rgba(255,255,255,0.7)';
    }

    // ── Camera Setup ──────────────────────────────────────────────────────────
    async function setupCamera() {
      video = document.getElementById('video');
      const constraints = {
        video: {
          facingMode: 'user',
          width: { ideal: 640 },
          height: { ideal: 480 },
          frameRate: { ideal: 30 }
        }
      };
      try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        return new Promise(resolve => {
          video.onloadedmetadata = () => resolve(video);
        });
      } catch (err) {
        setStatus('Camera unavailable', '');
        console.error('Camera error:', err);
        throw err;
      }
    }

    // ── Canvas Setup ───────────────────────────────────────────────────────────
    function setupCanvas() {
      overlayCanvas = document.getElementById('overlay-canvas');
      debugCanvas = document.getElementById('debug-canvas');
      ctx = overlayCanvas.getContext('2d');
      debugCtx = debugCanvas.getContext('2d');
      resizeCanvases();
      window.addEventListener('resize', resizeCanvases);
    }

    function resizeCanvases() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      overlayCanvas.width = w;
      overlayCanvas.height = h;
      debugCanvas.width = w;
      debugCanvas.height = h;
    }

    // ── Load Clothing Image ────────────────────────────────────────────────────
    function loadClothingImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = url;
      });
    }

    // ── Clothing Change from React Native ─────────────────────────────────────
    async function setClothing(item) {
      currentItem = item;
      document.getElementById('no-clothing-hint').classList.add('hidden');

      const label = document.getElementById('item-label');
      document.getElementById('item-label-text').textContent = item.name;
      document.getElementById('item-price').textContent = `$${item.price}`;
      if (item.colorHex) {
        document.getElementById('item-color-dot').style.background = item.colorHex;
      }
      label.classList.add('visible');

      clothingLoading = true;
      clothingImg = null;
      try {
        clothingImg = await loadClothingImage(item.imageUrl);
        clothingLoading = false;
      } catch (e) {
        clothingLoading = false;
        console.warn('Failed to load clothing image:', e);
      }
    }

    function clearClothing() {
      currentItem = null;
      clothingImg = null;
      document.getElementById('no-clothing-hint').classList.remove('hidden');
      document.getElementById('item-label').classList.remove('visible');
    }

    // ── Capture Photo ──────────────────────────────────────────────────────────
    async function capturePhoto() {
      const flash = document.getElementById('capture-flash');
      flash.classList.add('flash');
      setTimeout(() => flash.classList.remove('flash'), 200);

      // Composite video + overlay to a single canvas
      const captureCanvas = document.createElement('canvas');
      captureCanvas.width = overlayCanvas.width;
      captureCanvas.height = overlayCanvas.height;
      const cCtx = captureCanvas.getContext('2d');

      // Mirror draw of video
      cCtx.save();
      cCtx.translate(captureCanvas.width, 0);
      cCtx.scale(-1, 1);
      cCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
      cCtx.restore();

      // Draw the overlay (already mirrored by CSS, so draw straight)
      cCtx.drawImage(overlayCanvas, 0, 0);

      const dataUrl = captureCanvas.toDataURL('image/jpeg', 0.87);

      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify({
          type: 'photo',
          data: dataUrl
        }));
      }
      return dataUrl;
    }

    // ── Draw Skeleton ──────────────────────────────────────────────────────────
    const CONNECTIONS = [
      [5,6],[5,7],[7,9],[6,8],[8,10],
      [5,11],[6,12],[11,12],[11,13],[13,15],[12,14],[14,16]
    ];

    function drawSkeleton(keypoints, scaleX, scaleY) {
      if (!showSkeleton) return;
      debugCtx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);

      const kps = keypoints.map(kp => ({
        ...kp,
        sx: kp.x * scaleX,
        sy: kp.y * scaleY
      }));

      debugCtx.strokeStyle = 'rgba(201, 169, 110, 0.6)';
      debugCtx.lineWidth = 2;
      CONNECTIONS.forEach(([a, b]) => {
        const ka = kps[a]; const kb = kps[b];
        if (ka.score > 0.25 && kb.score > 0.25) {
          debugCtx.beginPath();
          debugCtx.moveTo(ka.sx, ka.sy);
          debugCtx.lineTo(kb.sx, kb.sy);
          debugCtx.stroke();
        }
      });

      kps.slice(5).forEach(kp => {
        if (kp.score > 0.25) {
          debugCtx.fillStyle = 'rgba(201, 169, 110, 0.9)';
          debugCtx.beginPath();
          debugCtx.arc(kp.sx, kp.sy, 4, 0, Math.PI * 2);
          debugCtx.fill();
        }
      });
    }

    // ── Draw Clothing Overlay ──────────────────────────────────────────────────
    function drawClothingOverlay(keypoints, canvasW, canvasH, videoW, videoH) {
      ctx.clearRect(0, 0, canvasW, canvasH);

      if (!clothingImg || !currentItem) return;

      const scaleX = canvasW / videoW;
      const scaleY = canvasH / videoH;

      const kp = keypoints;
      const lShoulder = kp[5];
      const rShoulder = kp[6];
      const lHip = kp[11];
      const rHip = kp[12];
      const lAnkle = kp[15];
      const rAnkle = kp[16];
      const lKnee = kp[13];
      const rKnee = kp[14];

      const cat = currentItem.category || 'Shirts';

      // ── Upper body (Shirts, Jackets, Dresses) ─────────────────────────────
      if (['Shirts', 'Jackets', 'Dresses'].includes(cat)) {
        if (lShoulder.score < 0.25 || rShoulder.score < 0.25) {
          // Pose not confident enough — show in center
          drawCentered(canvasW, canvasH, cat);
          return;
        }

        const lsx = lShoulder.x * scaleX;
        const lsy = lShoulder.y * scaleY;
        const rsx = rShoulder.x * scaleX;
        const rsy = rShoulder.y * scaleY;

        const rawMidX = (lsx + rsx) / 2;
        const rawMidY = (lsy + rsy) / 2;
        const rawShoulderWidth = dist(lsx, lsy, rsx, rsy);
        const rawAngle = Math.atan2(rsy - lsy, rsx - lsx);

        let rawTorsoH = rawShoulderWidth * 1.5;
        if (lHip.score > 0.2 && rHip.score > 0.2) {
          const lhx = lHip.x * scaleX;
          const lhy = lHip.y * scaleY;
          const rhx = rHip.x * scaleX;
          const rhy = rHip.y * scaleY;
          const hipMidY = (lhy + rhy) / 2;
          rawTorsoH = Math.abs(hipMidY - rawMidY);
        }

        // Dresses extend further down
        const heightMult = cat === 'Dresses' ? 2.0 : 1.35;
        rawTorsoH *= heightMult;

        // Smooth tracking
        smooth.midX = smoothVal(smooth.midX, rawMidX);
        smooth.midY = smoothVal(smooth.midY, rawMidY);
        smooth.angle = angleLerp(smooth.angle, rawAngle, ALPHA);
        smooth.shoulderWidth = smoothVal(smooth.shoulderWidth, rawShoulderWidth);
        smooth.torsoHeight = smoothVal(smooth.torsoHeight, rawTorsoH);

        const imgW = smooth.shoulderWidth * 1.55;
        const imgH = smooth.torsoHeight;
        const anchorY = -smooth.shoulderWidth * 0.18; // slight offset above shoulder line

        ctx.save();
        ctx.translate(smooth.midX, smooth.midY);
        ctx.rotate(smooth.angle);
        ctx.globalAlpha = 0.88;

        // Optional subtle shadow for depth
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetY = 4;

        ctx.drawImage(
          clothingImg,
          -imgW / 2, anchorY,
          imgW, imgH
        );

        ctx.restore();

        if (showSkeleton) {
          drawSkeleton(keypoints, scaleX, scaleY);
        }
      }

      // ── Pants ──────────────────────────────────────────────────────────────
      else if (cat === 'Pants') {
        if (lHip.score < 0.2 || rHip.score < 0.2) {
          drawCentered(canvasW, canvasH, cat);
          return;
        }

        const lhx = lHip.x * scaleX;
        const lhy = lHip.y * scaleY;
        const rhx = rHip.x * scaleX;
        const rhy = rHip.y * scaleY;
        const hipMidX = (lhx + rhx) / 2;
        const hipMidY = (lhy + rhy) / 2;
        const hipWidth = dist(lhx, lhy, rhx, rhy);
        const hipAngle = Math.atan2(rhy - lhy, rhx - lhx);

        let pantLen = hipWidth * 2.2;
        if (lAnkle.score > 0.2 && rAnkle.score > 0.2) {
          const lax = lAnkle.x * scaleX; const lay = lAnkle.y * scaleY;
          const rax = rAnkle.x * scaleX; const ray = rAnkle.y * scaleY;
          pantLen = Math.abs(((lay + ray) / 2) - hipMidY) * 1.1;
        } else if (lKnee.score > 0.2 && rKnee.score > 0.2) {
          const lkx = lKnee.x * scaleX; const lky = lKnee.y * scaleY;
          const rkx = rKnee.x * scaleX; const rky = rKnee.y * scaleY;
          pantLen = Math.abs(((lky + rky) / 2) - hipMidY) * 2.0;
        }

        smooth.hipMidX = smoothVal(smooth.hipMidX, hipMidX);
        smooth.hipMidY = smoothVal(smooth.hipMidY, hipMidY);
        smooth.hipWidth = smoothVal(smooth.hipWidth, hipWidth);
        smooth.torsoHeight = smoothVal(smooth.torsoHeight, pantLen);

        const imgW = smooth.hipWidth * 1.5;
        const imgH = smooth.torsoHeight;

        ctx.save();
        ctx.translate(smooth.hipMidX, smooth.hipMidY);
        ctx.rotate(hipAngle);
        ctx.globalAlpha = 0.88;
        ctx.drawImage(clothingImg, -imgW / 2, -imgH * 0.08, imgW, imgH);
        ctx.restore();
      }

      // ── Shoes ──────────────────────────────────────────────────────────────
      else if (cat === 'Shoes') {
        const anklesReady = lAnkle.score > 0.2 && rAnkle.score > 0.2;

        if (!anklesReady) {
          drawCentered(canvasW, canvasH, cat);
          return;
        }

        const lax = lAnkle.x * scaleX; const lay = lAnkle.y * scaleY;
        const rax = rAnkle.x * scaleX; const ray = rAnkle.y * scaleY;

        smooth.lAnkleX = smoothVal(smooth.lAnkleX, lax);
        smooth.lAnkleY = smoothVal(smooth.lAnkleY, lay);
        smooth.rAnkleX = smoothVal(smooth.rAnkleX, rax);
        smooth.rAnkleY = smoothVal(smooth.rAnkleY, ray);

        const shoeSize = dist(lax, lay, rax, ray) * 0.7;
        smooth.shoulderWidth = smoothVal(smooth.shoulderWidth, shoeSize);

        const sw = smooth.shoulderWidth;

        // Left shoe
        ctx.save();
        ctx.translate(smooth.lAnkleX, smooth.lAnkleY - sw * 0.3);
        ctx.globalAlpha = 0.9;
        ctx.drawImage(clothingImg, -sw * 0.55, -sw * 0.4, sw * 1.1, sw * 0.65);
        ctx.restore();

        // Right shoe (flipped horizontally)
        ctx.save();
        ctx.translate(smooth.rAnkleX, smooth.rAnkleY - sw * 0.3);
        ctx.scale(-1, 1);
        ctx.globalAlpha = 0.9;
        ctx.drawImage(clothingImg, -sw * 0.55, -sw * 0.4, sw * 1.1, sw * 0.65);
        ctx.restore();
      }
    }

    // ── Centered fallback (no pose) ────────────────────────────────────────────
    function drawCentered(canvasW, canvasH, category) {
      if (!clothingImg) return;
      const w = canvasW * 0.65;
      const h = w * (clothingImg.height / clothingImg.width);
      const x = (canvasW - w) / 2;
      let y;
      if (category === 'Shoes') y = canvasH * 0.65;
      else if (category === 'Pants') y = canvasH * 0.45;
      else y = canvasH * 0.15;

      ctx.save();
      ctx.globalAlpha = 0.75;
      ctx.drawImage(clothingImg, x, y, w, h);
      ctx.restore();
    }

    // ── Main Detection Loop ────────────────────────────────────────────────────
    async function detectLoop() {
      if (!isRunning) return;

      const canvasW = overlayCanvas.width;
      const canvasH = overlayCanvas.height;
      const videoW = video.videoWidth || 640;
      const videoH = video.videoHeight || 480;

      try {
        const poses = await detector.estimatePoses(video, {
          flipHorizontal: false
        });

        if (poses.length > 0 && poses[0].keypoints) {
          const keypoints = poses[0].keypoints;
          const lShoulder = keypoints[5];
          const rShoulder = keypoints[6];
          const tracking = lShoulder.score > 0.3 && rShoulder.score > 0.3;

          setStatus(
            tracking ? 'Body tracked' : 'Searching for body...',
            tracking ? 'tracking' : ''
          );

          drawClothingOverlay(keypoints, canvasW, canvasH, videoW, videoH);
        } else {
          setStatus('No person detected', '');
          ctx.clearRect(0, 0, canvasW, canvasH);
          if (clothingImg && currentItem) {
            drawCentered(canvasW, canvasH, currentItem.category);
          }
        }
      } catch (e) {
        console.warn('Detection error:', e);
      }

      animFrameId = requestAnimationFrame(detectLoop);
    }

    // ── Initialize ─────────────────────────────────────────────────────────────
    async function init() {
      try {
        setStatus('Setting up camera...', 'loading');
        await setupCamera();
        setupCanvas();

        setStatus('Loading pose model...', 'loading');
        document.getElementById('loading-label').textContent = 'Loading Pose AI';

        await tf.ready();

        detector = await poseDetection.createDetector(
          poseDetection.SupportedModels.MoveNet,
          {
            modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING,
            enableSmoothing: true,
            minPoseScore: 0.2
          }
        );

        const overlay = document.getElementById('loading-overlay');
        overlay.classList.add('hidden');
        setTimeout(() => overlay.style.display = 'none', 700);

        setStatus('Point camera at your body', '');
        isRunning = true;
        detectLoop();

      } catch (err) {
        setStatus('Initialization failed', '');
        console.error('Init error:', err);
      }
    }

    // ── React Native Bridge ────────────────────────────────────────────────────
    window.addEventListener('message', (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'setClothing') setClothing(msg.item);
        if (msg.type === 'clearClothing') clearClothing();
        if (msg.type === 'capture') capturePhoto();
        if (msg.type === 'toggleSkeleton') toggleSkeleton();
      } catch (err) {
        console.warn('Message parse error:', err);
      }
    });

    // Expo React Native WebView also fires on document
    document.addEventListener('message', (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'setClothing') setClothing(msg.item);
        if (msg.type === 'clearClothing') clearClothing();
        if (msg.type === 'capture') capturePhoto();
      } catch {}
    });

    // ── Boot ───────────────────────────────────────────────────────────────────
    window.addEventListener('load', init);
  </script>
</body>
</html>
