name: ar_try_on_flutter
description: A complete Flutter replica of the React Native AR-Try-On app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.5
  
  # Local Storage for Saved Looks
  shared_preferences: ^2.2.1
  
  # Native AR & 3D Rendering (User Spec)
  arcore_flutter_plugin: ^0.1.0
  arkit_plugin: ^1.3.0
  vector_math: ^2.1.4
  model_viewer_plus: ^1.7.0
  flutter_gl: ^0.0.18

  # Body Tracking & Camera
  camera: ^0.10.5+5
  google_mlkit_pose_detection: ^0.9.0
  
  # Keeping basic webview for non-AR fallbacks if needed
  webview_flutter: ^4.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/
  
  # In a real app we'd define the custom fonts from React Native (Inter)
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
